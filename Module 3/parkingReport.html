    <div class="container">
        <canvas id="myChart" style="width:100%;max-width:600px"></canvas>

<script>
const xValues = ["Booked Parking Area A", "Available Parking Area A", "Booked Parking Area B", "Available Parking Area B"];
const yValues = [0, 100, 0, 50];
const barColors = [
  "#b91d47",
  "#00aba9",
  "#2b5797",
  "#e8c3b9",
 
];

const ctx = document.getElementById('myChart');

new Chart(ctx, {
  type: "pie",
  data: {
    labels: xValues,
    datasets: [{
      backgroundColor: barColors,
      data: yValues
    }]
  },
  options: {
    plugins: {
      legend: {display:true},
      title: {
        display: true,
        text: "FK Parking Availability",
        font: {size:16}
      }
    }
  }
});
</script>
