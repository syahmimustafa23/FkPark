<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Summon History</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <img src="umpsa-logo-png.png" alt="UMPSA Logo" class="logo-img">
    <h2>Summon History</h2>

    <table id="historyTable">
      <thead>
        <tr>
          <th>Violation</th>
          <th>Vehicle Number</th>
          <th>Date & Time</th>
          <th>Area</th>
        </tr>
      </thead>
      <tbody>
        <!-- Records auto-load here -->
      </tbody>
    </table>

    <a href="manage-summon.html" class="btn-back">Add New Summon</a>
  </div>

  <script>
    const history = JSON.parse(localStorage.getItem("summonHistory")) || [];

    const tbody = document.querySelector("#historyTable tbody");

    history.forEach(item => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${item.violation}</td>
        <td>${item.vehicle}</td>
        <td>${item.datetime}</td>
        <td>${item.area}</td>
      `;
      tbody.appendChild(row);
    });
  </script>

</body>
</html>
