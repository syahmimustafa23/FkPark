<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Summon History</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HORIZONTAL HEADER -->
<header>
  <div class="navbar1">
    <a href="#">Homepage</a>
    <a href="#">Profile</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</header>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="#"><img class="logo" src="umpsa-logo-png.png"></a>
  <a class="sidebar2" href="manage-summon.html">Manage Traffic Summon</a>
  <a class="sidebar2" href="view-status.html">View Update Point & Status</a>
  <a class="sidebar2 active" href="dashboard.html">Manage Dashboard</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <h2>Summon History</h2>

  <table id="historyTable">
    <thead>
      <tr>
        <th>Violation type</th>
        <th>Vehicle Number</th>
        <th>Date & Time</th>
        <th>Area</th>
      </tr>
    </thead>
    <tbody>
      <!-- Records auto-load here -->
    </tbody>
  </table>

  <a href="manage-summon.html" class="btn-back">Add New Summon</a>

</div>

<script>
  const history = JSON.parse(localStorage.getItem("summonHistory")) || [];
  const tbody = document.querySelector("#historyTable tbody");

  history.forEach(item => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${item.violation}</td>
      <td>${item.vehicle}</td>
      <td>${item.datetime}</td>
      <td>${item.area}</td>
    `;
    tbody.appendChild(row);
  });
</script>

</body>
</html>
