<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Update Point & Status</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="umpsa-logo-png.png" alt="UMPSA Logo" class="logo-img">

        <div class="top-links">
            <a href="#">Homepage</a>
            <a href="#">Profile</a>
            <a href="dashboard.html">Dashboard</a>
        </div>

        <div class="search-box">Search</div>
    </div>

    <!-- LAYOUT -->
    <div class="layout">

        <!-- LEFT SIDEBAR -->
        <div class="sidebar">
            <a href="manage-summon.html">Manage Traffic Summon</a>
            <a href="view-status.html" class="active">View Update Point & Status</a>
            <a href="dashboard.html">Manage Dashboard</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">

	<div style="margin-bottom: 20px;">
    		<label for="vehicleSelect"><strong>Select Vehicle:</strong></label>
    		<select id="vehicleSelect" onchange="changeVehicle(this.value)">
    		</select>
	</div>


            <h3>View Update Point & Status</h3>

            <div class="info-box">
                <div class="profile-img">Profile picture</div>

                <div class="profile-details">
                    <div><strong>Status of enforcement:</strong> <span id="statusText">Loading...</span></div>
                </div>
            </div>

            <div class="details-panel">

                <div><strong>Latest Violation:</strong> <span id="vehicleType">-</span></div>
                <div><strong>Vehicle number:</strong> <span id="vehicleNumber">-</span></div>
                <div><strong>Total demerit points:</strong> <span id="demeritPoints">0</span></div>

                <h4 style="margin-top:20px;">History of Summons</h4>
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Violation</th>
                            <th>Vehicle</th>
                            <th>Date & Time</th>
                            <th>Area</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

            </div>

        </div>
    </div>
</div>


<script>
// Load summon history
const history = JSON.parse(localStorage.getItem("summonHistory")) || [];

// --- 1. GROUP SUMMONS BY VEHICLE ---
const vehicleData = {};
history.forEach(item => {
    if (!vehicleData[item.vehicle]) vehicleData[item.vehicle] = [];
    vehicleData[item.vehicle].push(item);
});

// --- 2. SELECT VEHICLE TO DISPLAY ---
let selectedVehicle = localStorage.getItem("selectedVehicle") || "";

// If no selected vehicle, pick the first available one
if (!selectedVehicle && Object.keys(vehicleData).length > 0) {
    selectedVehicle = Object.keys(vehicleData)[0];
    localStorage.setItem("selectedVehicle", selectedVehicle);
}

// --- 3. POPULATE DROPDOWN ---
const dropdown = document.getElementById("vehicleSelect");
dropdown.innerHTML = "";

Object.keys(vehicleData).forEach(vehicle => {
    const option = document.createElement("option");
    option.value = vehicle;
    option.textContent = vehicle;
    if (vehicle === selectedVehicle) option.selected = true;
    dropdown.appendChild(option);
});

// Function to calculate violation points
function getPoints(violation) {
    const v = violation.toLowerCase();
    if (v.includes("parking")) return 10;
    if (v.includes("traffic")) return 15;
    if (v.includes("accident")) return 20;
    return 0;
}

// Update UI for selected vehicle
function updateVehicleProfile(vehicle) {
    const tbody = document.querySelector("#historyTable tbody");
    tbody.innerHTML = "";

    const records = vehicleData[vehicle] || [];

    // No summons for this vehicle
    if (records.length === 0) {
        document.getElementById("statusText").textContent = "No summons for this vehicle";
        document.getElementById("vehicleNumber").textContent = vehicle;
        document.getElementById("vehicleType").textContent = "-";
        document.getElementById("demeritPoints").textContent = "0";
        return;
    }

    // Total violation points for THIS vehicle only
    let total = 0;
    records.forEach(r => total += getPoints(r.violation));

    document.getElementById("demeritPoints").textContent = total;

    // Status rules
    let status = "";
    if (total < 20) status = "Warning given";
    else if (total < 50) status = "Revoke in-campus vehicle permission: 1 semester";
    else if (total < 80) status = "Revoke in-campus vehicle permission: 2 semesters";
    else status = "Revoke permission for entire study duration";

    document.getElementById("statusText").textContent = status;

    // Latest record
    const latest = records[records.length - 1];
    document.getElementById("vehicleNumber").textContent = latest.vehicle;
    document.getElementById("vehicleType").textContent = latest.violation;

    // Populate summon history table
    records.forEach(item => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${item.violation}</td>
            <td>${item.vehicle}</td>
            <td>${item.datetime}</td>
            <td>${item.area}</td>
        `;
        tbody.appendChild(row);
    });
}

// Initialize
if (selectedVehicle) {
    updateVehicleProfile(selectedVehicle);
}

// --- 4. Vehicle switching ---
window.changeVehicle = function (vehicle) {
    localStorage.setItem("selectedVehicle", vehicle);
    updateVehicleProfile(vehicle);
};
</script>


</body>
</html>
